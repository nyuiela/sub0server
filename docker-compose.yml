# Redis + backend + agent-worker for Simulate / Run analysis.
# Run from sub0server. Set .env with DATABASE_URL, REDIS_URL, JWT_SECRET, API_KEY, AGENT_TRADING_ENABLED=true, etc.
#
# When Postgres runs on the host or in another container (e.g. docker start sub0-postgres), the backend
# must reach it. Use DATABASE_URL_DOCKER in .env with host.docker.internal instead of localhost, e.g.:
#   DATABASE_URL_DOCKER=postgresql://user:pass@host.docker.internal:5432/sub0
# Then Docker services use DATABASE_URL_DOCKER; leave DATABASE_URL as localhost for pnpm dev on the host.
#
# Profiles: use --profile app for backend+redis+worker (builds backend). Use --profile cron for cron-only (no build).
#   docker compose --profile app up -d
#   docker compose --profile cron up -d   (only lightweight cron container; set BACKEND_URL in .env)
# Prefer in-process cron: set TRIGGER_ALL_CRON_ENABLED=true in .env so the backend runs trigger-all on an interval (no Docker cron).

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    profiles:
      - app

  backend:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL_DOCKER:-${DATABASE_URL}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4000:4000"
    depends_on:
      redis: { condition: service_healthy }
    command: ["node", "dist/server.js"]
    profiles:
      - app

  agent-worker:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://backend:4000
      AGENT_TRADING_ENABLED: "true"
      DATABASE_URL: ${DATABASE_URL_DOCKER:-${DATABASE_URL}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis: { condition: service_healthy }
      backend: { condition: service_started }
    command: ["node", "dist/workers/agent-worker.js"]
    restart: unless-stopped
    profiles:
      - app

  # Lightweight cron container; only runs when using --profile cron. Does NOT build backend.
  agent-cron:
    image: alpine:3.19
    env_file: .env
    environment:
      CRON_INTERVAL_SECONDS: "300"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache curl
        INTERVAL=$${CRON_INTERVAL_SECONDS:-300}
        while true; do
          sleep $$INTERVAL
          curl -sf -X POST "$${BACKEND_URL}/api/agent/trigger-all" -H "x-api-key: $${API_KEY}" || true
        done
    restart: unless-stopped
    profiles:
      - cron
