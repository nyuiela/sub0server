# Redis + backend services for Sub0 server.
# agent-worker and agent-cron are removed — orchestration is now handled by CRE workflows.
# Run from sub0server. Set .env with DATABASE_URL, REDIS_URL, JWT_SECRET, API_KEY, etc.
#
# When Postgres runs on the host or in another container (e.g. docker start sub0-postgres), use
# DATABASE_URL_DOCKER with host.docker.internal:
#   DATABASE_URL_DOCKER=postgresql://user:pass@host.docker.internal:5432/sub0
#
# Profile: use --profile app to start backend + redis.
#   docker compose --profile app up -d

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    profiles:
      - app

  backend:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL_DOCKER:-${DATABASE_URL}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4000:4000"
    depends_on:
      redis: { condition: service_healthy }
    command: ["node", "dist/server.js"]
    profiles:
      - app
